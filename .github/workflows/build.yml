name: Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download BusyBox (ARM64)
        run: |
          mkdir -p app/src/main/assets
          curl -sL -o app/src/main/assets/busybox \
            "https://raw.githubusercontent.com/Magisk-Modules-Repo/busybox-ndk/master/busybox-arm64" \
            --connect-timeout 15 --max-time 30
          chmod +x app/src/main/assets/busybox
          ls -la app/src/main/assets/busybox

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-satellite-debug
          path: app/build/outputs/apk/debug/*.apk
